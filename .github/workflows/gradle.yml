name: Docker Compose CI/CD

on:
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_IMAGE }}:${IMAGE_TAG} \
            --push \
            .

      - name: Deploy to EC2 (only clash-db, clash-server)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /home/ubuntu/app

            echo "DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}" > .deploy.env
            echo "IMAGE_TAG=${{ github.sha }}" >> .deploy.env

            export $(cat .deploy.env | xargs)

            # ✅ 지정 서비스만 pull & up
            docker-compose pull clash-db clash-server
            docker-compose up -d --no-deps clash-db clash-server
