name: Docker Compose CI/CD

on:
  pull_request:
    branches: [ "ddong-branch" ]
    types: [ closed ]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Build & Test
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 4. Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build & Push (SHA tag)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build and Push Docker Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKER_IMAGE }}:${IMAGE_TAG} --push .

      # 6. Deploy via Docker Compose
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /home/ubuntu/app
            
            echo "DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}" > .deploy.env
            echo "IMAGE_TAG=${{ github.sha }}" >> .deploy.env
            
            export $(cat .deploy.env | xargs)
            
            docker compose pull
            docker compose up -d
