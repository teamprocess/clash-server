<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash 로그인 - Electron</title>
    <!-- Recaptcha 스크립트는 동적으로 로드됩니다 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .recaptcha-notice {
            font-size: 12px;
            color: #a0aec0;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Clash</h1>
            <p>데스크톱 앱 로그인</p>
        </div>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">아이디</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="아이디를 입력하세요"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="비밀번호를 입력하세요"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" id="submitBtn">로그인</button>

            <div class="loading" id="loading">
                로그인 중...
            </div>

            <div class="recaptcha-notice">
                이 사이트는 reCAPTCHA로 보호되며,<br>
                Google <a href="https://policies.google.com/privacy" target="_blank">개인정보처리방침</a> 및
                <a href="https://policies.google.com/terms" target="_blank">서비스 약관</a>이 적용됩니다.
            </div>
        </form>
    </div>

    <script>
        // 전역 변수
        let recaptchaSiteKey = null;

        // 1. 공개 설정 로드 (Recaptcha 사이트 키)
        async function loadConfig() {
            try {
                const response = await fetch('/api/config/public');
                const config = await response.json();
                recaptchaSiteKey = config.recaptcha.siteKey;

                // Recaptcha 스크립트 동적 로드
                const script = document.createElement('script');
                script.src = `https://www.google.com/recaptcha/api.js?render=${recaptchaSiteKey}`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);

            } catch (err) {
                console.error('설정 로드 실패:', err);
                showError('설정을 불러오는데 실패했습니다.');
            }
        }

        // 2. URL 파라미터 파싱
        const params = new URLSearchParams(window.location.search);
        const state = params.get('state');
        const redirectUri = params.get('redirectUri');

        // 3. 초기화
        (async function init() {
            // 필수 파라미터 검증
            if (!state || !redirectUri) {
                showError('잘못된 요청입니다. Electron 앱에서 다시 시도해주세요.');
                document.getElementById('loginForm').style.display = 'none';
                return;
            }

            // 설정 로드
            await loadConfig();
        })();

        // 폼 제출 처리
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('아이디와 비밀번호를 모두 입력해주세요.');
                return;
            }

            // UI 상태 변경
            setLoading(true);
            hideError();

            try {
                // 1. Recaptcha 로드 대기
                if (!recaptchaSiteKey) {
                    throw new Error('Recaptcha가 아직 로드되지 않았습니다.');
                }

                // grecaptcha.ready()로 라이브러리 로딩 대기
                await new Promise(resolve => grecaptcha.ready(resolve));

                // Recaptcha v3 토큰 받기
                const recaptchaToken = await grecaptcha.execute(recaptchaSiteKey, {
                    action: 'login'
                });

                // 2. 로그인 API 호출
                // 주의: fetch는 custom scheme(clashapp://)으로 302 리다이렉트할 수 없음
                // 서버는 200 + JSON으로 deep link URL을 반환해야 함
                const response = await fetch('/api/auth/electron/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        recaptchaToken: recaptchaToken,
                        action: 'login',
                        state: state,
                        redirectUri: redirectUri
                    })
                });

                // 3. 응답 처리
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    const errorMessage = errorData?.error?.message || errorData?.message || '로그인에 실패했습니다.';
                    throw new Error(errorMessage);
                }
                
                // 4. 성공: 서버에서 받은 deep link URL로 이동
                const data = await response.json();
                if (data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                } else {
                    throw new Error('서버 응답에 redirectUrl이 없습니다.');
                }

            } catch (err) {
                console.error('Login error:', err);
                showError(err.message || '로그인 중 오류가 발생했습니다. 다시 시도해주세요.');
            } finally {
                setLoading(false);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            const errorEl = document.getElementById('error');
            errorEl.classList.remove('show');
        }

        function setLoading(isLoading) {
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const inputs = document.querySelectorAll('input');

            submitBtn.disabled = isLoading;
            loading.classList.toggle('show', isLoading);
            inputs.forEach(input => input.disabled = isLoading);

            if (isLoading) {
                submitBtn.textContent = '로그인 중...';
            } else {
                submitBtn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
