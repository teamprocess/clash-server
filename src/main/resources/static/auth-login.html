<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash 로그인 - Electron</title>
    <script src="https://www.google.com/recaptcha/api.js?render=YOUR_RECAPTCHA_SITE_KEY"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .recaptcha-notice {
            font-size: 12px;
            color: #a0aec0;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚀 Clash</h1>
            <p>데스크톱 앱 로그인</p>
        </div>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">아이디</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="아이디를 입력하세요"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="비밀번호를 입력하세요"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" id="submitBtn">로그인</button>

            <div class="loading" id="loading">
                로그인 중...
            </div>

            <div class="recaptcha-notice">
                이 사이트는 reCAPTCHA로 보호되며,<br>
                Google <a href="https://policies.google.com/privacy" target="_blank">개인정보처리방침</a> 및
                <a href="https://policies.google.com/terms" target="_blank">서비스 약관</a>이 적용됩니다.
            </div>
        </form>
    </div>

    <script>
        // URL 파라미터 파싱
        const params = new URLSearchParams(window.location.search);
        const state = params.get('state');
        const redirectUri = params.get('redirectUri');

        // 필수 파라미터 검증
        if (!state || !redirectUri) {
            showError('잘못된 요청입니다. Electron 앱에서 다시 시도해주세요.');
            document.getElementById('loginForm').style.display = 'none';
        }

        // 폼 제출 처리
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('아이디와 비밀번호를 모두 입력해주세요.');
                return;
            }

            // UI 상태 변경
            setLoading(true);
            hideError();

            try {
                // 1. Recaptcha v3 토큰 받기
                const recaptchaToken = await grecaptcha.execute('YOUR_RECAPTCHA_SITE_KEY', {
                    action: 'login'
                });

                // 2. 로그인 API 호출
                const response = await fetch('/api/auth/electron/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        recaptchaToken: recaptchaToken,
                        action: 'login',
                        state: state,
                        redirectUri: redirectUri
                    }),
                    redirect: 'manual'  // 302 리다이렉트 직접 처리
                });

                // 3. 응답 처리
                if (response.type === 'opaqueredirect' || response.status === 0 || response.status === 302) {
                    // 302 리다이렉트 - Location 헤더에서 Deep Link URL 추출
                    const location = response.headers.get('Location');
                    if (location) {
                        // Deep Link로 리다이렉트
                        window.location.href = location;
                    } else {
                        // 응답 본문에서 리다이렉트 URL 파싱
                        const text = await response.text();
                        const match = text.match(/href="([^"]+)"/);
                        if (match && match[1]) {
                            window.location.href = match[1];
                        } else {
                            throw new Error('리다이렉트 URL을 찾을 수 없습니다.');
                        }
                    }
                } else if (response.ok) {
                    // 정상 응답인 경우에도 처리
                    const data = await response.json();
                    if (data.redirectUri) {
                        window.location.href = data.redirectUri;
                    } else {
                        throw new Error('로그인에 성공했지만 리다이렉트 정보가 없습니다.');
                    }
                } else {
                    // 에러 응답
                    const errorData = await response.json().catch(() => null);
                    const errorMessage = errorData?.error?.message || errorData?.message || '로그인에 실패했습니다.';
                    throw new Error(errorMessage);
                }

            } catch (err) {
                console.error('Login error:', err);
                showError(err.message || '로그인 중 오류가 발생했습니다. 다시 시도해주세요.');
            } finally {
                setLoading(false);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            const errorEl = document.getElementById('error');
            errorEl.classList.remove('show');
        }

        function setLoading(isLoading) {
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const inputs = document.querySelectorAll('input');

            submitBtn.disabled = isLoading;
            loading.classList.toggle('show', isLoading);
            inputs.forEach(input => input.disabled = isLoading);

            if (isLoading) {
                submitBtn.textContent = '로그인 중...';
            } else {
                submitBtn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
