<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash 회원가입 - Electron</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
        }

        .logo p {
            color: #718096;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .recaptcha-notice {
            font-size: 12px;
            color: #a0aec0;
            text-align: center;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        .help-text {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Clash</h1>
            <p id="stepTitle">데스크톱 앱 회원가입</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <!-- 1단계: 회원가입 폼 -->
        <form id="signupForm">
            <div class="form-group">
                <label for="username">아이디</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="3~20자, 영문/숫자/_ /-만 가능"
                    required
                    minlength="3"
                    maxlength="20"
                    pattern="[a-zA-Z0-9_-]+"
                    autocomplete="username"
                >
                <div class="help-text">영문, 숫자, _, -만 사용 가능합니다</div>
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="email@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="8자 이상, 영문+숫자 포함"
                    required
                    minlength="8"
                    maxlength="100"
                    autocomplete="new-password"
                >
                <div class="help-text">8자 이상, 영문과 숫자를 포함해야 합니다</div>
            </div>

            <button type="submit" id="submitBtn">회원가입</button>

            <div class="loading" id="loading">
                처리 중...
            </div>

            <div class="recaptcha-notice">
                이 사이트는 reCAPTCHA로 보호되며,<br>
                Google <a href="https://policies.google.com/privacy" target="_blank">개인정보처리방침</a> 및
                <a href="https://policies.google.com/terms" target="_blank">서비스 약관</a>이 적용됩니다.
            </div>
        </form>

        <!-- 2단계: 이메일 인증 폼 -->
        <form id="verifyForm" class="hidden">
            <div class="form-group">
                <label for="verificationCode">인증 코드</label>
                <input
                    type="text"
                    id="verificationCode"
                    name="verificationCode"
                    placeholder="6자리 숫자"
                    required
                    minlength="6"
                    maxlength="6"
                    pattern="[0-9]{6}"
                    autocomplete="off"
                >
                <div class="help-text">이메일로 발송된 6자리 인증 코드를 입력하세요</div>
            </div>

            <button type="submit" id="verifyBtn">인증 확인</button>

            <div class="loading" id="verifyLoading">
                인증 중...
            </div>
        </form>
    </div>

    <script>
        // 전역 변수
        let recaptchaSiteKey = null;
        let currentStep = 1;  // 1: 회원가입, 2: 이메일 인증

        // URL 파라미터
        const params = new URLSearchParams(window.location.search);
        const state = params.get('state');
        const redirectUri = params.get('redirectUri');

        // 1. 공개 설정 로드 (Recaptcha 사이트 키)
        async function loadConfig() {
            try {
                const response = await fetch('/api/config/public');
                const config = await response.json();
                recaptchaSiteKey = config.data.recaptcha.siteKey;

                // Recaptcha 스크립트 동적 로드
                const script = document.createElement('script');
                script.src = `https://www.google.com/recaptcha/api.js?render=${recaptchaSiteKey}`;
                script.async = true;
                script.defer = true;
                document.head.appendChild(script);

            } catch (err) {
                console.error('설정 로드 실패:', err);
                showError('설정을 불러오는데 실패했습니다.');
            }
        }

        // 2. 초기화
        (async function init() {
            // 필수 파라미터 검증
            if (!state || !redirectUri) {
                showError('잘못된 요청입니다. Electron 앱에서 다시 시도해주세요.');
                document.getElementById('signupForm').style.display = 'none';
                return;
            }

            // 설정 로드
            await loadConfig();
        })();

        // 3. 회원가입 폼 제출
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // 유효성 검증
            if (!username || !email || !password) {
                showError('모든 필드를 입력해주세요.');
                return;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                showError('아이디는 영문, 숫자, _, -만 사용 가능합니다.');
                return;
            }

            if (password.length < 8) {
                showError('비밀번호는 8자 이상이어야 합니다.');
                return;
            }

            if (!/^(?=.*[A-Za-z])(?=.*\d).+$/.test(password)) {
                showError('비밀번호는 영문과 숫자를 포함해야 합니다.');
                return;
            }

            // UI 상태 변경
            setLoading(true, 'signup');
            hideError();

            try {
                // Recaptcha 로드 대기
                if (!recaptchaSiteKey) {
                    throw new Error('Recaptcha가 아직 로드되지 않았습니다.');
                }

                await new Promise(resolve => grecaptcha.ready(resolve));

                // Recaptcha 토큰 받기
                const recaptchaToken = await grecaptcha.execute(recaptchaSiteKey, {
                    action: 'signup'
                });

                // 회원가입 API 호출
                const response = await fetch('/api/auth/electron/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Recaptcha-Token': recaptchaToken
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        state: state,
                        redirectUri: redirectUri
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    const errorMessage = errorData?.error?.message || errorData?.message || '회원가입에 실패했습니다.';
                    throw new Error(errorMessage);
                }

                // 성공: 이메일 인증 단계로 전환
                showSuccess('이메일로 인증 코드가 발송되었습니다. 이메일을 확인해주세요.');
                switchToVerifyStep();

            } catch (err) {
                console.error('Signup error:', err);
                showError(err.message || '회원가입 중 오류가 발생했습니다.');
            } finally {
                setLoading(false, 'signup');
            }
        });

        // 4. 이메일 인증 폼 제출
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const verificationCode = document.getElementById('verificationCode').value.trim();

            if (!verificationCode || verificationCode.length !== 6) {
                showError('6자리 인증 코드를 입력해주세요.');
                return;
            }

            setLoading(true, 'verify');
            hideError();

            try {
                // Recaptcha 토큰 받기
                await new Promise(resolve => grecaptcha.ready(resolve));
                const recaptchaToken = await grecaptcha.execute(recaptchaSiteKey, {
                    action: 'verify_email'
                });

                // 이메일 인증 API 호출
                const response = await fetch('/api/auth/electron/signup/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Recaptcha-Token': recaptchaToken
                    },
                    body: JSON.stringify({
                        verificationCode: verificationCode,
                        state: state,
                        redirectUri: redirectUri
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    const errorMessage = errorData?.error?.message || errorData?.message || '이메일 인증에 실패했습니다.';
                    throw new Error(errorMessage);
                }

                // 성공: Deep link로 이동
                const result = await response.json();
                if (result.data && result.data.redirectUrl) {
                    showSuccess('인증이 완료되었습니다. Clash 앱으로 이동합니다...');
                    setTimeout(() => {
                        window.location.href = result.data.redirectUrl;
                    }, 1500);
                } else {
                    throw new Error('서버 응답에 redirectUrl이 없습니다.');
                }

            } catch (err) {
                console.error('Verify error:', err);
                showError(err.message || '인증 중 오류가 발생했습니다.');
            } finally {
                setLoading(false, 'verify');
            }
        });

        // UI 전환: 회원가입 → 이메일 인증
        function switchToVerifyStep() {
            currentStep = 2;
            document.getElementById('stepTitle').textContent = '이메일 인증';
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('verifyForm').classList.remove('hidden');
            document.getElementById('verificationCode').focus();
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById('success').classList.remove('show');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success');
            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById('error').classList.remove('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
            document.getElementById('success').classList.remove('show');
        }

        function setLoading(isLoading, form) {
            if (form === 'signup') {
                const submitBtn = document.getElementById('submitBtn');
                const loading = document.getElementById('loading');
                const inputs = document.querySelectorAll('#signupForm input');

                submitBtn.disabled = isLoading;
                loading.classList.toggle('show', isLoading);
                inputs.forEach(input => input.disabled = isLoading);

                submitBtn.textContent = isLoading ? '처리 중...' : '회원가입';
            } else if (form === 'verify') {
                const verifyBtn = document.getElementById('verifyBtn');
                const loading = document.getElementById('verifyLoading');
                const input = document.getElementById('verificationCode');

                verifyBtn.disabled = isLoading;
                loading.classList.toggle('show', isLoading);
                input.disabled = isLoading;

                verifyBtn.textContent = isLoading ? '인증 중...' : '인증 확인';
            }
        }
    </script>
</body>
</html>
