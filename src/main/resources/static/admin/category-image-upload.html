<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 이미지 업로드 (Admin)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 24px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 12px; }
        section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
        button { padding: 9px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button:hover { background: #2563eb; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        .msg { font-size: 13px; margin-top: 10px; padding: 8px 10px; border-radius: 4px; }
        .msg.ok { background: #d1fae5; color: #065f46; }
        .msg.err { background: #fee2e2; color: #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>카테고리 이미지 업로드 (Admin)</h1>

    <div id="authMsg"></div>

    <!-- 카테고리 선택 + 이미지 업로드 -->
    <section id="uploadSection" class="hidden">
        <h2>1. 카테고리 선택</h2>
        <label>카테고리</label>
        <select id="categorySelect">
            <option value="">-- 불러오는 중 --</option>
        </select>

        <h2>2. 이미지 선택 및 업로드</h2>
        <label>이미지 파일</label>
        <input id="imageFile" type="file" accept="image/*" />
        <button id="uploadBtn" onclick="uploadImage()" disabled>업로드</button>
        <div id="uploadMsg"></div>
    </section>
</div>

<script>
    const authMsg        = document.getElementById('authMsg');
    const uploadSection  = document.getElementById('uploadSection');
    const categorySelect = document.getElementById('categorySelect');
    const imageFile      = document.getElementById('imageFile');
    const uploadBtn      = document.getElementById('uploadBtn');
    const uploadMsg      = document.getElementById('uploadMsg');

    function showMsg(el, text, isError) {
        el.textContent = text;
        el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    // 페이지 로드 시 카테고리 조회 (서버에서 이미 ADMIN 검증 완료)
    loadCategories();

    async function loadCategories() {
        try {
            const res = await fetch('/api/admin/categories', { credentials: 'include' });
            const json = await res.json();
            if (!res.ok || !json.success) {
                throw new Error(json.error?.message || '카테고리 불러오기 실패');
            }
            uploadSection.classList.remove('hidden');
            const categories = json.data.categories;
            categorySelect.replaceChildren();
            if (categories.length === 0) {
                categorySelect.appendChild(new Option('카테고리 없음', ''));
            } else {
                categories.forEach(c => categorySelect.appendChild(new Option(`[${c.id}] ${c.name}`, c.id)));
            }
            imageFile.addEventListener('change', updateUploadBtn);
            categorySelect.addEventListener('change', updateUploadBtn);
            updateUploadBtn();
        } catch (e) {
            showMsg(authMsg, e.message, true);
        }
    }

    function updateUploadBtn() {
        uploadBtn.disabled = !(categorySelect.value && imageFile.files[0]);
    }

    async function uploadImage() {
        const categoryId = categorySelect.value;
        const file = imageFile.files[0];

        if (!categoryId || !file) return;

        uploadBtn.disabled = true;
        uploadBtn.textContent = '업로드 중...';
        showMsg(uploadMsg, '(1/3) 업로드 URL 발급 중...', false);

        try {
            // Step 1: presigned URL 발급
            const issueRes = await fetch(`/api/admin/categories/${categoryId}/image-upload-url`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileName: file.name, contentType: file.type })
            });
            const issueJson = await issueRes.json();
            if (!issueRes.ok || !issueJson.success) {
                throw new Error(issueJson.error?.message || `업로드 URL 발급 실패 (HTTP ${issueRes.status})`);
            }
            const { uploadUrl, fileUrl, contentType } = issueJson.data;

            // Step 2: S3에 직접 업로드
            showMsg(uploadMsg, '(2/3) S3에 파일 업로드 중...', false);
            const s3Res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Type': contentType },
                body: file
            });
            if (!s3Res.ok) {
                throw new Error(`S3 업로드 실패 (HTTP ${s3Res.status})`);
            }

            // Step 3: 서버에 imageUrl 반영
            showMsg(uploadMsg, '(3/3) 이미지 URL 저장 중...', false);
            const confirmRes = await fetch(`/api/admin/categories/${categoryId}/image`, {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ imageUrl: fileUrl })
            });
            const confirmJson = await confirmRes.json();
            if (!confirmRes.ok || !confirmJson.success) {
                throw new Error(confirmJson.error?.message || `이미지 URL 저장 실패 (HTTP ${confirmRes.status})`);
            }

            showMsg(uploadMsg, `업로드 완료! 이미지 URL: ${confirmJson.data.imageUrl}`, false);
        } catch (e) {
            showMsg(uploadMsg, e.message, true);
        } finally {
            uploadBtn.textContent = '업로드';
            updateUploadBtn();
        }
    }
</script>
</body>
</html>
