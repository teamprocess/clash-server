<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 이미지 업로드 (Admin)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 24px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 12px; }
        section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
        button { padding: 9px 18px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button:hover { background: #2563eb; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        .msg { font-size: 13px; margin-top: 10px; padding: 8px 10px; border-radius: 4px; }
        .msg.ok { background: #d1fae5; color: #065f46; }
        .msg.err { background: #fee2e2; color: #991b1b; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>카테고리 이미지 업로드 (Admin)</h1>

    <!-- 1. 로그인 -->
    <section id="loginSection">
        <h2>1. 로그인</h2>
        <label>아이디</label>
        <input id="username" type="text" placeholder="username" />
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="password" />
        <button id="loginBtn" onclick="login()">로그인</button>
        <div id="loginMsg"></div>
    </section>

    <!-- 2. 카테고리 선택 + 이미지 업로드 -->
    <section id="uploadSection" class="hidden">
        <h2>2. 카테고리 선택</h2>
        <label>카테고리</label>
        <select id="categorySelect">
            <option value="">-- 불러오는 중 --</option>
        </select>

        <h2>3. 이미지 선택 및 업로드</h2>
        <label>이미지 파일</label>
        <input id="imageFile" type="file" accept="image/*" />
        <button id="uploadBtn" onclick="uploadImage()" disabled>업로드</button>
        <div id="uploadMsg"></div>
    </section>
</div>

<script>
    function showMsg(id, text, isError) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');

        if (!username || !password) {
            showMsg('loginMsg', '아이디와 비밀번호를 입력하세요.', true);
            return;
        }

        btn.disabled = true;
        btn.textContent = '로그인 중...';

        try {
            const res = await fetch('/api/auth/sign-in', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, rememberMe: false })
            });

            const json = await res.json();
            if (!res.ok || !json.success) {
                showMsg('loginMsg', json.error?.message || '로그인 실패', true);
                btn.disabled = false;
                btn.textContent = '로그인';
                return;
            }

            btn.textContent = '로그인됨';
            showMsg('loginMsg', `${json.data.name}(${json.data.username})으로 로그인되었습니다.`, false);
            document.getElementById('uploadSection').classList.remove('hidden');
            await loadCategories();
        } catch (e) {
            showMsg('loginMsg', '오류: ' + e.message, true);
            btn.disabled = false;
            btn.textContent = '로그인';
        }
    }

    async function loadCategories() {
        const select = document.getElementById('categorySelect');
        try {
            const res = await fetch('/api/admin/categories', {
                credentials: 'include'
            });
            const json = await res.json();
            if (!res.ok || !json.success) {
                select.replaceChildren(new Option('카테고리 불러오기 실패', ''));
                return;
            }
            const categories = json.data.categories;
            select.replaceChildren();
            if (categories.length === 0) {
                select.appendChild(new Option('카테고리 없음', ''));
            } else {
                categories.forEach(c => select.appendChild(new Option(`[${c.id}] ${c.name}`, c.id)));
            }

            document.getElementById('imageFile').addEventListener('change', updateUploadBtn);
            select.addEventListener('change', updateUploadBtn);
            updateUploadBtn();
        } catch (e) {
            select.innerHTML = '<option>오류: ' + e.message + '</option>';
        }
    }

    function updateUploadBtn() {
        const hasCategory = !!document.getElementById('categorySelect').value;
        const hasFile = !!document.getElementById('imageFile').files[0];
        document.getElementById('uploadBtn').disabled = !(hasCategory && hasFile);
    }

    async function uploadImage() {
        const categoryId = document.getElementById('categorySelect').value;
        const file = document.getElementById('imageFile').files[0];
        const btn = document.getElementById('uploadBtn');

        if (!categoryId || !file) return;

        btn.disabled = true;
        btn.textContent = '업로드 중...';
        showMsg('uploadMsg', '(1/3) 업로드 URL 발급 중...', false);

        try {
            // Step 1: presigned URL 발급
            const issueRes = await fetch(`/api/admin/categories/${categoryId}/image-upload-url`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileName: file.name, contentType: file.type })
            });
            const issueJson = await issueRes.json();
            if (!issueRes.ok || !issueJson.success) {
                showMsg('uploadMsg', '업로드 URL 발급 실패: ' + (issueJson.error?.message || issueRes.status), true);
                return;
            }

            const { uploadUrl, fileUrl, contentType } = issueJson.data;

            // Step 2: S3에 직접 업로드
            showMsg('uploadMsg', '(2/3) S3에 파일 업로드 중...', false);
            const s3Res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Type': contentType },
                body: file
            });
            if (!s3Res.ok) {
                showMsg('uploadMsg', 'S3 업로드 실패: HTTP ' + s3Res.status, true);
                return;
            }

            // Step 3: 서버에 imageUrl 반영
            showMsg('uploadMsg', '(3/3) 이미지 URL 저장 중...', false);
            const confirmRes = await fetch(`/api/admin/categories/${categoryId}/image`, {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ imageUrl: fileUrl })
            });
            const confirmJson = await confirmRes.json();
            if (!confirmRes.ok || !confirmJson.success) {
                showMsg('uploadMsg', '이미지 URL 저장 실패: ' + (confirmJson.error?.message || confirmRes.status), true);
                return;
            }

            showMsg('uploadMsg', `업로드 완료! 이미지 URL: ${confirmJson.data.imageUrl}`, false);
        } catch (e) {
            showMsg('uploadMsg', '오류: ' + e.message, true);
        } finally {
            btn.disabled = false;
            btn.textContent = '업로드';
            updateUploadBtn();
        }
    }
</script>
</body>
</html>
