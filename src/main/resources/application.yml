spring:
  main:
    web-application-type: servlet

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          batch_size: 50
          order_updates: true
          order_inserts: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  servlet:
    session:
      timeout: 3d
