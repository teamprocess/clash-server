spring:
  main:
    web-application-type: servlet

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
        show_sql: ${SHOW_SQL:false}
        jdbc:
          time_zone: UTC
          batch_size: 50
          order_updates: true
          order_inserts: true

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  flyway:
    placeholders:
      global_cutover_timestamp: ${GLOBAL_CUTOVER_TIMESTAMP:2026-02-15 00:00:00}

  mail:
    host: email-smtp.ap-northeast-2.amazonaws.com # 서울 리전 기준
    port: 587
    username: ${AWS_SES_SMTP_USERNAME} # AWS에서 생성한 SMTP 아이디
    password: ${AWS_SES_SMTP_PASSWORD} # AWS에서 생성한 SMTP 비밀번호
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10

server:
  servlet:
    session:
      timeout: 3d
      cookie:
        same-site: none
        secure: true   # None 설정 시 필수
        http-only: true

github:
  sync:
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com/graphql}
    default-token: ${GITHUB_ACCESS_TOKEN:}
    recompute-days: ${GITHUB_RECOMPUTE_DAYS:30}
    timezone: ${GITHUB_TIMEZONE:Asia/Seoul}
    day-boundary-hour: ${GITHUB_DAY_BOUNDARY_HOUR:6}
    max-concurrency: ${GITHUB_MAX_CONCURRENCY:1}
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    oauth-base-url: ${GITHUB_OAUTH_BASE_URL:https://github.com}
    api-base-url: ${GITHUB_OAUTH_API_BASE_URL:https://api.github.com}

record:
  timezone: ${RECORD_TIMEZONE:Asia/Seoul}
  day-boundary-hour: ${RECORD_DAY_BOUNDARY_HOUR:6}

mail:
  sender:
    address: ${MAIL_SENDER_ADDRESS:no-reply@clash.kr}
    name: ${MAIL_SENDER_NAME:Clash}

realtime:
  socketio:
    host: ${SOCKETIO_HOST:0.0.0.0}
    port: ${SOCKETIO_PORT:9092}
    path: ${SOCKETIO_PATH:/socket.io}
    allowed-origins: ${SOCKETIO_ALLOWED_ORIGINS:*}
    ping-interval-ms: ${SOCKETIO_PING_INTERVAL_MS:25000}
    ping-timeout-ms: ${SOCKETIO_PING_TIMEOUT_MS:60000}
    token-ttl-seconds: ${SOCKETIO_TOKEN_TTL_SECONDS:300}

google:
  recaptcha:
    key:
      site: ${RECAPTCHA_SITE_KEY}
      secret: ${RECAPTCHA_SECRET_KEY}
      url: https://www.google.com/recaptcha/api/siteverify

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_S3_REGION:ap-northeast-2}
    profile-image-prefix: "users/profile-images"
    category-image-prefix: "categories/images"
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    presign-expiration-seconds: ${AWS_S3_PRESIGN_EXPIRATION_SECONDS:300}

electron:
  auth:
    allowed-redirect-uris:
      - "clashapp://auth"
    auth-web-url: "https://clash.kr/#/sign-in"
    signup-web-url: "https://clash.kr/#/sign-up"

security:
  remember-me:
    key: ${REMEMBER_ME_KEY:UniqueKey}
