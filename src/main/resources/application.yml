spring:
  main:
    web-application-type: servlet

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          batch_size: 50
          order_updates: true
          order_inserts: true

server:
  servlet:
    session:
      timeout: 3d

github:
  sync:
    api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com/graphql}
    default-token: ${GITHUB_ACCESS_TOKEN:}
    recompute-days: ${GITHUB_RECOMPUTE_DAYS:30}
    timezone: ${GITHUB_TIMEZONE:Asia/Seoul}
    day-boundary-hour: ${GITHUB_DAY_BOUNDARY_HOUR:6}
    max-concurrency: ${GITHUB_MAX_CONCURRENCY:1}
