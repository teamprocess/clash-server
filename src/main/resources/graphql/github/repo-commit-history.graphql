query (
  $owner: String!,
  $name: String!,
  $first: Int!,
  $after: String,
  $since: GitTimestamp,
  $until: GitTimestamp,
  $author: CommitAuthor
) {
  repository(owner: $owner, name: $name) {
    defaultBranchRef {
      name
      target {
        ... on Commit {
          history(
            first: $first,
            after: $after,
            since: $since,
            until: $until,
            author: $author
          ) {
            nodes {
              additions
              deletions
              committedDate
              author {
                email
                user {
                  login
                  name
                }
              }
            }
            pageInfo {
              hasNextPage
              endCursor
            }
          }
        }
      }
    }
  }
  rateLimit {
    cost
    remaining
    resetAt
  }
}
