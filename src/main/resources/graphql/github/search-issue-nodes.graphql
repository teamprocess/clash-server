query (
  $query: String!,
  $first: Int!,
  $after: String
) {
  search(type: ISSUE, query: $query, first: $first, after: $after) {
    issueCount
    nodes {
      __typename
      ... on PullRequest {
        createdAt
        mergedAt
        closedAt
        state
        repository {
          name
        }
      }
      ... on Issue {
        createdAt
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
  rateLimit {
    cost
    remaining
    resetAt
  }
}
